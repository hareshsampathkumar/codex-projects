name: Gmail AI Drafter

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gmail-ai-drafter
  cancel-in-progress: false

jobs:
  draft-replies:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Gmail AI drafter
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
          GMAIL_ACCOUNTS_JSON: ${{ secrets.GMAIL_ACCOUNTS_JSON }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_MAX_CANDIDATES: ${{ vars.GMAIL_MAX_CANDIDATES || '20' }}
          DRY_RUN: ${{ vars.DRY_RUN || secrets.DRY_RUN || 'false' }}
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('gmail_ai_drafter.py')
          text = path.read_text()
          old = '''        except Exception:
            skipped += 1
            print("Skipped candidate due to draft generation error.")
            continue
'''
          new = '''        except Exception as exc:
            skipped += 1
            message = str(exc).replace("\\n", " ")[:500]
            print(f"Skipped candidate due to draft generation error: {type(exc).__name__}: {message}")
            continue
'''
          if old not in text:
              raise SystemExit('Could not patch draft-generation error logging block.')
          path.write_text(text.replace(old, new))
          PY
          python gmail_ai_drafter.py
